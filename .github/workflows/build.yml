name: build

on: [push]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v5

    - uses: actions/setup-go@v6
      with:
        go-version: '>=1.21.0'

    - name: Build
      run: go build .

    - name: Run vet
      run: go vet ./...

    - name: Run tests
      run: go test ./...
